<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kompletny Taryfikator Państwowy</title>
    <style>
        :root {
            --bg-color: #0a0c10;
            --panel-bg: #111520;
            --accent-blue: #00e5ff;
            --accent-red: #ff3d00;
            --text-color: #ffffff;
            --text-muted: #7e8e9f;
            --border-color: #1f2637;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
            display: flex;
            gap: 20px;
            height: 100vh;
            overflow: hidden;
        }

        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        header {
            background-color: var(--panel-bg);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            margin-bottom: 15px;
        }

        h1 {
            font-size: 18px;
            margin-bottom: 10px;
            color: var(--accent-blue);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .search-bar {
            width: 100%;
            padding: 12px;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            color: white;
            font-size: 14px;
        }

        .search-bar:focus {
            outline: none;
            border-color: var(--accent-blue);
        }

        .law-container {
            flex: 1;
            overflow-y: auto;
            padding-right: 5px;
        }

        .category-block {
            background-color: var(--panel-bg);
            border-radius: 8px;
            border: 1px solid var(--border-color);
            margin-bottom: 15px;
            overflow: hidden;
        }

        .category-title {
            background-color: rgba(255, 255, 255, 0.02);
            padding: 12px 15px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .category-block.kw .category-title { color: #ff9100; border-left: 4px solid #ff9100; }
        .category-block.kk .category-title { color: #ff5252; border-left: 4px solid #ff5252; }

        .law-list {
            padding: 5px 10px;
        }

        .law-item {
            display: flex;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.02);
            cursor: pointer;
            transition: background 0.15s;
        }

        .law-item:hover {
            background-color: rgba(255,255,255,0.03);
        }

        .law-item input[type="checkbox"] {
            margin-right: 15px;
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--accent-blue);
        }

        .law-details {
            flex: 1;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .law-name {
            font-size: 13px;
            line-height: 1.4;
        }

        .law-punishment {
            font-size: 12.5px;
            font-weight: bold;
            text-align: right;
            white-space: nowrap;
            margin-left: 15px;
        }

        .kw .law-punishment { color: #ffbc00; }
        .kk .law-punishment { color: #ff6b6b; }

        .summary-panel {
            width: 400px;
            background-color: var(--panel-bg);
            border-radius: 8px;
            border: 1px solid var(--border-color);
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 100%;
            box-shadow: 0 4px 25px rgba(0,0,0,0.5);
        }

        .summary-title {
            font-size: 16px;
            font-weight: bold;
            text-transform: uppercase;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 10px;
            margin-bottom: 20px;
            text-align: center;
            letter-spacing: 1px;
        }

        .stat-box {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 14px;
        }

        .stat-value {
            font-weight: bold;
            color: var(--accent-blue);
        }

        .verdict-box {
            flex: 1;
            display: flex;
            flex-direction: column;
            margin-top: 15px;
        }

        .verdict-box label {
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .verdict-text {
            width: 100%;
            flex: 1;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            color: var(--text-color);
            padding: 12px;
            font-size: 12.5px;
            resize: none;
            line-height: 1.4;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            margin-top: 10px;
        }

        .btn-copy { background-color: var(--accent-blue); color: #000; }
        .btn-clear { background-color: transparent; color: var(--text-muted); border: 1px solid var(--border-color); }
        .btn:hover { opacity: 0.85; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-color); }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }
    </style>
</head>

                    { art: "Art. 223 §1 KK", name: "Czynna napaść na funkcjonariusza publicznego z użyciem broni / narzędzia", cash: 35000, time: 60, pts: 0 },
                    { art: "Art. 224 §2 KK", name: "Stosowanie przemocy w celu zmuszenia funkcjonariusza do zaniechania czynności", cash: 10000, time: 18, pts: 0 },
                    { art: "Art. 226 §1 KK", name: "Znieważenie funkcjonariusza publicznego na służbie (Obraza słowna)", cash: 5000, time: 12, pts: 0 },
                    { art: "Art. 227 KK", name: "Podszywanie się pod funkcjonariusza publicznego i wykonywanie jego czynności", cash: 15000, time: 20, pts: 0 },
                    { art: "Art. 228 §1 KK", name: "Łapownictwo bierne (Przyjęcie łapówki przez urzędnika / policjanta)", cash: 30000, time: 48, pts: 0 },
                    { art: "Art. 229 §1 KK", name: "Łapownictwo czynne (Próba przekupstwa / wręczenie łapówki)", cash: 25000, time: 36, pts: 0 },
                    { art: "Art. 231 §1 KK", name: "Nadużycie władzy lub niedopełnienie obowiązków przez funkcjonariusza", cash: 20000, time: 36, pts: 0 }
                ]
            },
            {
                category: "KODEKS KARNY - WYMIAR SPRAWIEDLIWOŚCI",
                type: "kk",
                items: [
                    { art: "Art. 233 §1 KK", name: "Składanie fałszywych zeznań lub zatajanie prawdy przed organem ścigania", cash: 12000, time: 36, pts: 0 },
                    { art: "Art. 234 KK", name: "Fałszywe oskarżenie innej osoby o popełnienie czynu zabronionego", cash: 8000, time: 18, pts: 0 },
                    { art: "Art. 235 KK", name: "Tworzenie fałszywych dowodów lub podrzucanie ich w celu oskarżenia", cash: 15000, time: 24, pts: 0 },
                    { art: "Art. 239 §1 KK", name: "Poplecznictwo (Ukrywanie sprawcy, pomaganie w uniknięciu kary)", cash: 15000, time: 24, pts: 0 },
                    { art: "Art. 242 §1 KK", name: "Ucieczka osoby pozbawionej wolności lub zatrzymanej (Ucieczka z konwoju/aresztu)", cash: 15000, time: 24, pts: 0 }
                ]
            },
            {
                category: "KODEKS KARNY - PORZĄDEK PUBLICZNY I ORGANIZACJE PRZESTĘPCZE",
                type: "kk",
                items: [
                    { art: "Art. 254a KK", name: "Zamach na urządzenia infrastruktury technicznej (Niszczenie sieci, trakcji)", cash: 20000, time: 30, pts: 0 },
                    { art: "Art. 256 §1 KK", name: "Publiczne propagowanie nazistowskiego, faszystowskiego lub totalitarnego ustroju", cash: 6000, time: 12, pts: 0 },
                    { art: "Art. 258 §1 KK", name: "Udział w zorganizowanej grupie przestępczej (Gang / Mafia)", cash: 30000, time: 48, pts: 0 },
                    { art: "Art. 258 §3 KK", name: "Założenie lub kierowanie zorganizowaną grupą przestępczą (Lider grupy)", cash: 80000, time: 120, pts: 0 }
                ]
            },
            {

                type: "kk",
                items: [
                    { art: "Art. 263 §1 KK", name: "Handel bronią palną lub amunicją bez wymaganego zezwolenia / koncesji", cash: 45000, time: 60, pts: 0 },
                    { art: "Art. 263 §2 KK", name: "Posiadanie broni palnej lub amunicji bez wymaganego zezwolenia", cash: 20000, time: 36, pts: 0 }
                ]
            },
            {
                category: "USTAWA O PRZECIWDZIAŁANIU NARKOMANII (UPN)",
                type: "kk",
                items: [
                    { art: "Art. 53 UPN", name: "Nielegalne wytwarzanie, przetwarzanie lub przerabianie narkotyków", cash: 50000, time: 72, pts: 0 },
                    { art: "Art. 59 UPN", name: "Udzielanie innej osobie środka odurzającego, nakłanianie lub handel (Dilerstwo)", cash: 25000, time: 48, pts: 0 },
                    { art: "Art. 62 ust. 1 UPN", name: "Posiadanie środków odurzających lub substancji psychotropowych (Ilość detaliczna)", cash: 4000, time: 12, pts: 0 },
                    { art: "Art. 62 ust. 2 UPN", name: "Posiadanie znacznej ilości środków odurzających (Hurt / Magazyn)", cash: 15000, time: 36, pts: 0 },
                    { art: "Art. 63 UPN", name: "Nielegalna uprawa konopi, maku lub krzewu koki (Plantacja)", cash: 12000, time: 24, pts: 0 }
                ]
            }
        ];

        const container = document.getElementById('lawContainer');

        function renderDatabase() {
            container.innerHTML = '';
            database.forEach((cat, index) => {
                const block = document.createElement('div');
                block.className = `category-block ${cat.type}`;
                block.id = `cat-${index}`;
                
                let itemsHtml = '';
                cat.items.forEach(item => {
                    const ptsStr = item.pts > 0 ? ` | ${item.pts} pkt` : '';
                    const timeStr = item.time > 0 ? ` | ${item.time} mies.` : '';
                    itemsHtml += `
                        <div class="law-item" data-art="${item.art}" data-cash="${item.cash}" data-time="${item.time}" data-pts="${item.pts}">
                            <input type="checkbox">
                            <div class="law-details">
                                <span class="law-name"><strong>${item.art}</strong> - ${item.name}</span>
                                <span class="law-punishment">${item.cash} PLN${timeStr}${ptsStr}</span>
                            </div>
                        </div>
                    `;
                });

                block.innerHTML = `
                    <div class="category-title" onclick="toggleCategory(${index})">${cat.category} <span>[Zwiń/Rozwiń]</span></div>
                    <div class="law-list" id="list-${index}">${itemsHtml}</div>
                `;
                container.appendChild(block);
            });
            attachCheckboxEvents();
        }

        function toggleCategory(index) {
            const list = document.getElementById(`list-${index}`);
            list.style.display = (list.style.display === 'none') ? 'block' : 'none';
        }

        function attachCheckboxEvents() {
            document.querySelectorAll('.law-item').forEach(item => {
                item.addEventListener('click', (e) => {
                    if (e.target.tagName !== 'INPUT') {
                        const cb = item.querySelector('input[type="checkbox"]');
                        cb.checked = !cb.checked;
                        calculate();
                    }
                });
                const cb = item.querySelector('input[type="checkbox"]');
                cb.addEventListener('change', calculate);
            });
        }

        function calculate() {
            let totalCash = 0;
            let totalTime = 0;
            let totalPoints = 0;
            let selected = [];

            document.querySelectorAll('.law-item input[type="checkbox"]').forEach(cb => {
                if (cb.checked) {
                    const item = cb.closest('.law-item');
                    totalCash += parseInt(item.getAttribute('data-cash')) || 0;
                    totalTime += parseInt(item.getAttribute('data-time')) || 0;
                    totalPoints += parseInt(item.getAttribute('data-pts')) || 0;
                    selected.push(item.getAttribute('data-art'));
                }
            });

            document.getElementById('totalCash').innerText = `${totalCash.toLocaleString()} PLN`;
            document.getElementById('totalTime').innerText = `${totalTime} miesięcy`;
            document.getElementById('totalPoints').innerText = `${totalPoints} pkt`;

            if (selected.length > 0) {
                document.getElementById('verdictOutput').value = `[KARTOTEKA] Złamane artykuły: ${selected.join(', ')} | Mandat: ${totalCash} PLN | Odsiatka: ${totalTime} mies. | Punkty: ${totalPoints} pkt.`;
            } else {
                document.getElementById('verdictOutput').value = '';
            }
        }

        document.getElementById('search').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            
            database.forEach((cat, idx) => {
                const block = document.getElementById(`cat-${idx}`);
                const list = document.getElementById(`list-${idx}`);
                let visibleItems = 0;

                block.querySelectorAll('.law-item').forEach(item => {
                    const text = item.textContent.toLowerCase();
                    if (text.includes(query)) {
                        item.style.display = 'flex';
                        visibleItems++;
                    } else {
                        item.style.display = 'none';
                    }
                });

                if (visibleItems > 0) {
                    block.style.display = 'block';
                    list.style.display = 'block';
                } else {
                    block.style.display = 'none';
                }
            });
        });

        document.getElementById('btnCopy').addEventListener('click', () => {
            const vo = document.getElementById('verdictOutput');
            if (!vo.value) return;
            vo.select();
            navigator.clipboard.writeText(vo.value);
            
            const btn = document.getElementById('btnCopy');
            const txt = btn.innerText;
            btn.innerText = "SKOPIOWANO!";
            btn.style.backgroundColor = "#00e676";
            setTimeout(() => { btn.innerText = txt; btn.style.backgroundColor = "var(--accent-blue)"; }, 1000);
        });

        document.getElementById('btnClear').addEventListener('click', () => {
            document.querySelectorAll('.law-item input[type="checkbox"]').forEach(cb => cb.checked = false);
            calculate();
        });

        renderDatabase();
    </script>
</body>
